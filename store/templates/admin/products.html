{% extends 'admin/base.html' %}
{% load static %}

{% block content %}
<h1>Products</h1>

<table>
    <tr>
        <th>ID</th>
        <th>Name</th>
        <th>Price</th>
        <th>Created</th>
    </tr>

    {% for product in products %}
    <tr>
        <td>{{ product.id }}</td>
        <td>{{ product.name }}</td>
        <td>₦{{ product.price }}</td>
        <td>{{ product.created_at }}</td>
    </tr>
    <td>
    <a href="{% url 'delete_product' product.id %}"
       class="delete-btn"
       onclick="return confirm('Are you sure you want to delete this product?');">
        Delete
    </a>
</td>
    {% endfor %}

    
</table>



{% endblock %}
