{% extends 'main/base.html' %}

{% block title %}Checkout - {{ product.name }}{% endblock %}

{% block content %}

    <section class="hero">
        <h1>Checkout</h1>
        <p class="subtitle">Complete your purchase for <strong>{{ product.name }}</strong></p>
    </section>

    <section class="checkout-section">
        <div class="checkout-container">
            
            <div class="product-summary">
                <img src="{{ product.image.url }}" alt="{{ product.name }}" style="max-width:300px;">
                <h2>{{ product.name }}</h2>
                <h3>₦{{ product.price }}</h3>
            </div>

            <form method="POST">
                {% csrf_token %}
                
                <div class="form-group">
                    <label>Full Name <span class="required">*</span></label>
                    <input type="text" name="full_name" class="form-control" required>
                </div>

                <div class="form-group">
                    <label>Email Address <span class="required">*</span></label>
                    <input type="email" name="email" class="form-control" required>
                </div>

                <div class="form-group">
                    <label>Phone Number <span class="required">*</span></label>
                    <input type="tel" name="phone" class="form-control" required>
                </div>

                <button type="submit" class="btn-large">Pay ₦{{ product.price }} with Paystack</button>
            </form>
        </div>
    </section>

{% endblock %}
